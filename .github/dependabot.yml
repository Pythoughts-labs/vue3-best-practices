version: 2
updates:
  # Keep GitHub Actions current (Node runtime deprecations break old action versions).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
      - dependencies
    commit-message:
      prefix: "chore(ci)"

  # MCP server runtime dependencies.
  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
